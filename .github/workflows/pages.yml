name: Deploy to GitHub Pages

# Publishes by mirroring main to the gh-pages branch, which GitHub Pages
# serves (branch source, / root). The GITHUB_TOKEN cannot enable Pages or
# create Actions-source deployments on this repo ("Resource not accessible
# by integration"), but it can push branches — and the gh-pages branch is
# what switched Pages on in the first place.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node --test

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Mirror main to gh-pages
        run: git push --force origin HEAD:gh-pages
